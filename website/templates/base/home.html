{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downy Mildew Leaf Assessment</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}" sizes="any" />
    <link
      rel="icon"
      href="{% static 'images/favicon-32x32.png' %}"
      type="image/png"
      sizes="32x32"
    />
    <link
      rel="icon"
      href="{% static 'images/favicon-16x16.png' %}"
      type="image/png"
      sizes="16x16"
    />
    <link rel="apple-touch-icon" href="{% static 'images/apple-touch-icon.png' %}" />
    <link rel="stylesheet" href="{% static 'css/base/home.css' %}" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <p class="eyebrow">Leaf image analysis</p>
        <h1>Downy Mildew Assessment</h1>
        <p class="subtitle">
          Upload a leaf image to estimate the affected area.
        </p>
      </section>

      <section class="workspace" aria-label="Leaf assessment workspace">
        <div class="drop-zone is-idle" id="drop-zone">
          <form id="upload-form" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.image }}

            <label
              for="id_image"
              class="drop-zone-idle"
              id="drop-idle"
            >
              <span class="drop-icon" aria-hidden="true">
                <svg
                  width="40"
                  height="40"
                  viewBox="0 0 24 24"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <path
                    d="M12 16V4M12 4L8 8M12 4L16 8"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                  <path
                    d="M4 16V17C4 18.1046 4.89543 19 6 19H18C19.1046 19 20 18.1046 20 17V16"
                    stroke="currentColor"
                    stroke-width="1.75"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span class="drop-title">Drop a leaf image here</span>
              <span class="drop-hint">
                or <span class="drop-browse">browse files</span>
              </span>
              <span class="drop-note">Use a clear, well-lit photo for best results.</span>
            </label>

            <div class="drop-zone-result hidden" id="drop-result" hidden>
              <div class="result-layout">
                <div class="preview-frame">
                  <img
                    id="preview-image"
                    src=""
                    alt="Selected leaf sample"
                    class="preview-image"
                  />
                </div>
                <div class="result-side">
                  <div
                    id="results-status"
                    class="result-card"
                    aria-live="polite"
                  ></div>
                  <div class="result-meta">
                    <span class="preview-meta-label">Selected file</span>
                    <span
                      id="preview-filename"
                      class="preview-meta-name"
                      title=""
                    ></span>
                  </div>
                  <button type="button" class="btn-secondary" id="retry-btn">
                    Analyze another image
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="{% static 'js/base/home.js' %}"></script>
  </body>
</html>
